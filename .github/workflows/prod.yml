name: Deploy Prod

on:
  push:
    branches: [stable]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

# NOTE: Workload Identity Federation must be configured in GCP.
# See dev.yml for setup instructions.

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build & Deploy to Prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/23815247728/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@kelihi-ai-platform.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Submit Cloud Build (build + deploy prod)
        run: |
          gcloud builds submit \
            --config=cloudbuild-prod.yaml \
            --substitutions="_TAG=prod-${GITHUB_SHA::7}" \
            --project=kelihi-ai-platform \
            .

      - name: Print deploy info
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "## Prod Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${GITHUB_SHA::7}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** prod-${GITHUB_SHA::7}" >> $GITHUB_STEP_SUMMARY
