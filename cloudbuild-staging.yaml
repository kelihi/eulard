steps:
  # Build the container image with staging-specific and latest tags
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/eulard/eulard:${_TAG}'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/eulard/eulard:latest'
      - '.'
    id: 'build'

  # Push images to Artifact Registry before deploying
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/eulard/eulard:${_TAG}']
    id: 'push-tag'
    waitFor: ['build']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/eulard/eulard:latest']
    id: 'push-latest'
    waitFor: ['build']

  # Update Cloud Run staging service with the new image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'eulard-staging'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/eulard/eulard:${_TAG}'
      - '--region=us-central1'
      - '--project=$PROJECT_ID'
    id: 'deploy'
    waitFor: ['push-tag']

substitutions:
  _TAG: 'latest'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/eulard/eulard:${_TAG}'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/eulard/eulard:latest'

options:
  logging: CLOUD_LOGGING_ONLY
