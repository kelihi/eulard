steps:
  - name: 'node:20-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'corepack enable && pnpm install --frozen-lockfile && pnpm run build'
    id: 'validate'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/eulard/eulard:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/eulard/eulard:latest'
      - '.'
    id: 'build'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/eulard/eulard:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/eulard/eulard:latest'

options:
  logging: CLOUD_LOGGING_ONLY
