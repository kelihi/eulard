apiVersion: apps/v1
kind: Deployment
metadata:
  name: eulard-web
  namespace: eulard
  labels:
    app.kubernetes.io/part-of: eulard
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eulard-web
  template:
    metadata:
      labels:
        app: eulard-web
        app.kubernetes.io/part-of: eulard
    spec:
      serviceAccountName: eulard-sa
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: eulard
          image: us-central1-docker.pkg.dev/kelihi-ai-platform/eulard/eulard:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: eulard-secrets
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /api/init
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/init
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
